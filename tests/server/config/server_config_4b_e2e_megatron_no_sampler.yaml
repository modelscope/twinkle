# Twinkle Server Configuration - E2E Test (4B, Megatron DP=2 PP=2) - NO SAMPLER
#
# Same as server_config_4b_e2e_megatron.yaml but WITHOUT the vLLM sampler
# application. Embedding training (and any forward/backward-only workflow) does
# not need a sampler, so dropping it avoids loading a ~40GB vLLM engine and cuts
# server startup time significantly.
#
# NOTE: with no sampler the extra 1-GPU Ray worker started by
# tests/server/start_e2e_server.py is simply unused (the model's PP=2 x DP=2
# still fits on the head node's 4 GPUs).

proxy_location: EveryNode

http_options:
  host: 0.0.0.0
  port: 9000

applications:

  - name: server
    route_prefix: /api/v1
    import_path: server
    args:
      server_config:
        per_token_model_limit: 30
      supported_models:
        - Qwen/Qwen3.5-4B
    deployments:
      - name: TinkerCompatServer
        max_ongoing_requests: 50
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 128
        ray_actor_options:
          num_cpus: 0.1
          runtime_env:
            env_vars:
              TWINKLE_FAIL_FAST: "0"

  - name: models-Qwen3.5-4B
    route_prefix: /api/v1/model/Qwen/Qwen3.5-4B
    import_path: model
    args:
      backend: megatron
      model_id: "ms://Qwen/Qwen3.5-4B"
      max_length: 10240
      nproc_per_node: 4
      device_group:
        name: model
        ranks: 4
        device_type: cuda
      device_mesh:
        device_type: cuda
        dp_size: 2
        pp_size: 2
      queue_config:
        rps_limit: 100
        tps_limit: 100000
      adapter_config:
        adapter_timeout: 30
    deployments:
      - name: ModelManagement
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 16
        ray_actor_options:
          num_cpus: 0.1
          runtime_env:
            env_vars:
              TWINKLE_TRUST_REMOTE_CODE: "1"
              TWINKLE_FAIL_FAST: "0"

  - name: processor
    route_prefix: /api/v1/processor
    import_path: processor
    args:
      ncpu_proc_per_node: 2
      device_group:
        name: model
        ranks: 2
        device_type: CPU
      device_mesh:
        device_type: CPU
        dp_size: 2
    deployments:
      - name: ProcessorManagement
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 128
        ray_actor_options:
          num_cpus: 0.1
          runtime_env:
            env_vars:
              TWINKLE_FAIL_FAST: "0"
