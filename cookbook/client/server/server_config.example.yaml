# =============================================================================
# Twinkle Server — fully documented example configuration
# =============================================================================
#
# This file is a reference: every field carries its type, default value, and
# the available options. Loadable as-is via:
#
#     python -m twinkle.server check-config --config server_config.example.yaml
#     python -m twinkle.server launch       --config server_config.example.yaml
#
# Field naming after the Phase 0c refactor is strict: legacy aliases
# `telemetry_config` / `persistence_config` are no longer accepted (R8). Use
# `telemetry` / `persistence` instead.

# Optional. Ray cluster namespace.
# Type: string | null. Default: null (resolves to "twinkle_cluster").
# Env override: TWINKLE_RAY_NAMESPACE.
ray_namespace: twinkle_cluster

# Optional. Ray Serve proxy placement.
# Type: string | null. Options: "EveryNode" (default for multi-node), "HeadOnly".
proxy_location: EveryNode

# HTTP listener.
# host: str — bind address. Default "localhost". Use "0.0.0.0" to listen on all.
# port: int — TCP port. Default 8000.
http_options:
  host: 0.0.0.0
  port: 8000

# Telemetry (OpenTelemetry pipeline).
# enabled: bool — when false, init/shutdown is a NoOp. Default false.
# debug:   bool — true: console exporters; false: OTLP exporter. Default false.
# service_name:    str — OTEL resource service.name. Default "twinkle-server".
# otlp_endpoint:   str — gRPC OTLP endpoint. Default "http://localhost:4317".
# export_interval_ms: int — metric export interval in ms. Default 30000.
# resource_attributes: map[str, any] — extra OTEL Resource attributes. Default {}.
telemetry:
  enabled: false
  debug: false
  service_name: twinkle-server
  otlp_endpoint: http://localhost:4317
  export_interval_ms: 30000

# Persistence backend for ServerState (sessions, models, futures, ...).
# mode:        str — "memory" | "file" | "redis". Default "memory".
# file_path:   str — required when mode == "file".
# redis_url:   str — required when mode == "redis", e.g. "redis://localhost:6379/0".
# key_prefix:  str — optional global key prefix. Default "".
persistence:
  mode: memory
  # file_path: /tmp/twinkle_state.json
  # redis_url: redis://localhost:6379/0
  # key_prefix: ""

# Task queue / rate-limit defaults (overridable per application under args.queue_config).
# rps_limit:               float >= 0 — requests/sec. 0 disables. Default 100.0.
# tps_limit:               float >= 0 — input tokens/sec. 0 disables. Default 16000.0.
# window_seconds:          float > 0  — rate-limit sliding window. Default 1.0.
# queue_timeout:           float >= 0 — max queue wait (s). Default 300.0.
# execution_timeout:       float >= 0 — task execution timeout (s). 0 disables. Default 120.0.
# enabled:                 bool       — rate limiting on/off. Default true.
# token_cleanup_multiplier:float >= 0 — token retention multiplier. Default 10.0.
# token_cleanup_interval:  float >= 0 — cleanup task interval (s). Default 60.0.
# max_input_tokens:        int   >= 1 — per-request input token cap. Default 16000.
task_queue:
  rps_limit: 100.0
  tps_limit: 16000.0
  window_seconds: 1.0
  queue_timeout: 300.0
  execution_timeout: 120.0
  enabled: true
  max_input_tokens: 16000

# Applications: each entry deploys one component (server | model | sampler | processor).
# Required fields per entry:
#   name:        str — Ray Serve app name.
#   route_prefix:str — HTTP route prefix. Default "/".
#   import_path: str — one of {server, model, sampler, processor}.
#   args:        map — typed args, schema selected by import_path.
# Optional:
#   deployments: list — Ray Serve deployment options (only the first is used).
applications:

  # 1. Tinker-compatible gateway (server)
  - name: server
    route_prefix: /api/v1
    import_path: server
    args:
      # ServerArgs schema — fields are optional unless noted.
      server_config:
        per_token_model_limit: 3
      supported_models:
        - mock-model
    deployments:
      - name: GatewayServer
        max_ongoing_requests: 50
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 128
        ray_actor_options:
          num_cpus: 0.1

  # 2. Model deployment.
  #    backend: str — required. Options: "mock" | "transformers" | "megatron".
  #    model_id: str — required. Model identifier (e.g. "Qwen/Qwen3.5-4B").
  #    nproc_per_node: int — distributed processes per node. Default 1.
  #    device_group / device_mesh: dict — required parallelism config.
  #    max_loras: int — per-replica LoRA capacity. Default 5.
  #    queue_config: map — overrides task_queue defaults for this app.
  - name: models
    route_prefix: /api/v1/model
    import_path: model
    args:
      backend: mock
      model_id: mock-model
      nproc_per_node: 1
      device_group:
        name: model
        ranks: 1
        device_type: cpu
      device_mesh:
        device_type: cpu
        dp_size: 1
      max_loras: 5
      queue_config:
        rps_limit: 100
        tps_limit: 100000
    deployments:
      - name: ModelManagement
        autoscaling_config: { min_replicas: 1, max_replicas: 1, target_ongoing_requests: 16 }
        ray_actor_options: { num_cpus: 0.1 }

  # 3. Sampler deployment.
  #    sampler_type: str — required. Options: "mock" | "vllm" | "torch".
  - name: sampler
    route_prefix: /api/v1/sampler
    import_path: sampler
    args:
      sampler_type: mock
      model_id: mock-model
      nproc_per_node: 1
      device_group: { name: sampler, ranks: 1, device_type: cpu }
      device_mesh: { device_type: cpu, dp_size: 1 }
    deployments:
      - name: SamplerManagement
        autoscaling_config: { min_replicas: 1, max_replicas: 1, target_ongoing_requests: 16 }
        ray_actor_options: { num_cpus: 0.1 }

  # 4. Processor deployment (CPU-only feature engineering).
  - name: processor
    route_prefix: /api/v1/processor
    import_path: processor
    args:
      ncpu_proc_per_node: 2
      device_group: { name: processor, ranks: 2, device_type: cpu }
      device_mesh: { device_type: cpu, dp_size: 2 }
    deployments:
      - name: ProcessorManagement
        autoscaling_config: { min_replicas: 1, max_replicas: 1, target_ongoing_requests: 128 }
        ray_actor_options: { num_cpus: 0.1 }
